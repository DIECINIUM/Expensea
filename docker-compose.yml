name: spendgraph-ai

x-api-environment: &api-environment
  APP_NAME: ${APP_NAME:-SpendGraph AI API}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  APP_ENV: ${APP_ENV:-development}
  APP_DEBUG: ${APP_DEBUG:-true}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  API_HOST: 0.0.0.0
  API_PORT: 8000
  CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:5173"]}'
  DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
  DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-4000-8000-000000000001}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-spendgraph}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spendgraph}
  POSTGRES_DB: ${POSTGRES_DB:-spendgraph}

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spendgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spendgraph}
      POSTGRES_DB: ${POSTGRES_DB:-spendgraph}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - spendgraph_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: ./apps/api
      target: development
    environment:
      <<: *api-environment
      DEMO_SEED_ENABLED: ${DEMO_SEED_ENABLED:-true}
    command:
      [
        "sh",
        "-c",
        'alembic -c alembic.ini upgrade head && if [ "$${DEMO_SEED_ENABLED}" = "true" ]; then python -m app.seed; fi',
      ]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./apps/api
      target: development
    environment:
      <<: *api-environment
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "${BIND_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      target: development
    environment:
      VITE_GRAPHQL_URL: /graphql
      VITE_DEV_API_TARGET: http://api:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "${BIND_HOST:-127.0.0.1}:${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/index.html:/app/index.html
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  spendgraph_postgres_data:
