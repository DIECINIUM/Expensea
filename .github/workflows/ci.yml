name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:5173"]'
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: spendgraph
      POSTGRES_PASSWORD: spendgraph
      POSTGRES_DB: spendgraph_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: spendgraph
          POSTGRES_PASSWORD: spendgraph
          POSTGRES_DB: spendgraph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spendgraph -d spendgraph_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.lock

      - name: Install backend
        run: |
          python -m pip install -r apps/api/requirements-dev.lock
          python -m pip install --no-deps -e ./apps/api

      - name: Lint and format check
        run: |
          ruff check apps/api
          ruff format --check apps/api

      - name: Type-check
        run: mypy --config-file apps/api/pyproject.toml apps/api/app

      - name: Test
        run: pytest apps/api/tests

      - name: Exercise migrations on PostgreSQL
        run: |
          alembic -c apps/api/alembic.ini upgrade head
          alembic -c apps/api/alembic.ini downgrade base
          alembic -c apps/api/alembic.ini upgrade head

      - name: Audit Python dependencies
        run: pip-audit --strict -r apps/api/requirements.lock

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Check formatting
        working-directory: apps/web
        run: npm run format:check

      - name: Type-check
        working-directory: apps/web
        run: npm run typecheck

      - name: Test
        working-directory: apps/web
        run: npm run test

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Audit runtime dependencies
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high

  containers:
    name: Container contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate Compose
        run: docker compose --env-file .env.example config --quiet

      - name: Build API targets
        run: |
          docker build --target development --tag spendgraph-api:ci-dev apps/api
          docker build --target production --tag spendgraph-api:ci-prod apps/api

      - name: Build web development target
        run: docker build --target development --tag spendgraph-web:ci apps/web

  foundation-smoke:
    name: Web to API smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install locked dependencies
        run: make setup

      - name: Exercise browser-facing GraphQL proxy
        run: make smoke

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          download="${RUNNER_TEMP}/${archive}"
          curl --fail --silent --show-error --location \
            --output "${download}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_SHA256}  ${download}" | sha256sum --check
          tar --extract --gzip --file "${download}" \
            --directory "${RUNNER_TEMP}" gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Scan full Git history
        run: gitleaks git --no-banner --redact --verbose --log-opts="--all" .
